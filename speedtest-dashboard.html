        * {

            box-sizing: border-box;

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1a2733;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid #2a3a4a;
        }
        .stat-card .label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
        }
        .stat-card .unit {
            font-size: 0.8rem;
            color: #888;
        }
        .stat-card.download .value { color: #36a2eb; }
        .stat-card.upload .value { color: #4bc0c0; }
        .stat-card.ping .value { color: #ffce56; }
        .stat-card.errors .value { color: #ff6384; }

        .chart-container {
            background: #1a2733;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #2a3a4a;
        }
        .chart-container h2 {
            margin-bottom: 15px;
            font-size: 1.1rem;
            color: #ccc;
        }
        .chart-wrapper {
            position: relative;

</head>
