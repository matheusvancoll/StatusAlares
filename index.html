<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Test Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1923;
            color: #e0e0e0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
            color: #fff;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1a2733;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid #2a3a4a;
        }
        .stat-card .label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
        }
        .stat-card .unit {
            font-size: 0.8rem;
            color: #888;
        }
        .stat-card.download .value { color: #36a2eb; }
        .stat-card.upload .value { color: #4bc0c0; }
        .stat-card.ping .value { color: #ffce56; }
        .stat-card.errors .value { color: #ff6384; }

        .chart-container {
            background: #1a2733;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #2a3a4a;
        }
        .chart-container h2 {
            margin-bottom: 15px;
            font-size: 1.1rem;
            color: #ccc;
        }
        .chart-wrapper {
            position: relative;
            height: 300px;
        }
        .error-message {
            color: #ff6384;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>&#9889; Speed Test Dashboard</h1>
    <p class="subtitle" id="dashboard-subtitle">Carregando resultados...</p>

    <div class="stats-grid">
        <div class="stat-card download">
            <div class="label">Média Download</div>
            <div class="value" id="avg-download">--</div>
            <div class="unit">Mbps</div>
        </div>
        <div class="stat-card upload">
            <div class="label">Média Upload</div>
            <div class="value" id="avg-upload">--</div>
            <div class="unit">Mbps</div>
        </div>
        <div class="stat-card ping">
            <div class="label">Média Ping</div>
            <div class="value" id="avg-ping">--</div>
            <div class="unit">ms</div>
        </div>
        <div class="stat-card errors">
            <div class="label">Testes com Erro</div>
            <div class="value" id="error-count">--</div>
            <div class="unit">falhas</div>
        </div>
    </div>

    <div class="chart-container">
        <h2>Download &amp; Upload (Mbps)</h2>
        <div class="chart-wrapper">
            <canvas id="speedChart"></canvas>
        </div>
    </div>

    <div class="chart-container">
        <h2>Ping (ms)</h2>
        <div class="chart-wrapper">
            <canvas id="pingChart"></canvas>
        </div>
    </div>

    <div class="chart-container">
        <h2>Download vs Upload (Dispersão)</h2>
        <div class="chart-wrapper">
            <canvas id="scatterChart"></canvas>
        </div>
    </div>

    <script>
    async function initDashboard() {
        try {
            // Busca os dados diretamente do arquivo JSON na mesma pasta
            const response = await fetch('speedtests_1.1.json');
            if (!response.ok) {
                throw new Error(`Erro ao carregar JSON: ${response.statusText}`);
            }
            const rawData = await response.json();

            if (!rawData || rawData.length === 0) {
                document.getElementById('dashboard-subtitle').textContent = "Nenhum dado encontrado no JSON.";
                return;
            }

            // Ordena por tempo de criação (antigos para os recentes)
            const sortedData = rawData.sort((a, b) => new Date(a.created) - new Date(b.created));

            // Filtra apenas as entradas que possuem testes válidos (ignorando erros com valor -1)
            const validData = sortedData.filter(d => d.download !== -1 && d.upload !== -1 && d.ping !== -1);
            
            // Conta quantos erros existem no arquivo baseado na propriedade 'error' ou valores inválidos
            const errorCount = sortedData.filter(d => d.error || d.download === -1).length;

            // Atualiza a data do subtítulo pegando o dia do último teste executado
            const lastTestDate = new Date(sortedData[sortedData.length - 1].created);
            const formattedDate = lastTestDate.toLocaleDateString('pt-BR');
            document.getElementById('dashboard-subtitle').textContent = `Resultados dos testes de velocidade - ${formattedDate}`;

            // Se existirem dados válidos, faz os cálculos de média
            if (validData.length > 0) {
                const avgDownload = (validData.reduce((s, d) => s + d.download, 0) / validData.length).toFixed(1);
                const avgUpload = (validData.reduce((s, d) => s + d.upload, 0) / validData.length).toFixed(1);
                const avgPing = (validData.reduce((s, d) => s + d.ping, 0) / validData.length).toFixed(0);

                document.getElementById('avg-download').textContent = avgDownload;
                document.getElementById('avg-upload').textContent = avgUpload;
                document.getElementById('avg-ping').textContent = avgPing;
            } else {
                document.getElementById('avg-download').textContent = '0';
                document.getElementById('avg-upload').textContent = '0';
                document.getElementById('avg-ping').textContent = '0';
            }
            
            document.getElementById('error-count').textContent = errorCount;

            // Mapeia os horários formatados (HH:MM) para o eixo X
            const labels = validData.map(d => {
                const date = new Date(d.created);
                return date.getHours().toString().padStart(2, '0') + ':' + date.getMinutes().toString().padStart(2, '0');
            });

            // Configurações globais do Chart.js
            Chart.defaults.color = '#888';
            Chart.defaults.borderColor = '#2a3a4a';

            // 1. Gráfico de Linha: Download e Upload
            new Chart(document.getElementById('speedChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Download (Mbps)',
                            data: validData.map(d => d.download),
                            borderColor: '#36a2eb',
                            backgroundColor: 'rgba(54, 162, 235, 0.1)',
                            fill: true,
                            tension: 0.3,
                            pointRadius: 2,
                            pointHoverRadius: 5
                        },
                        {
                            label: 'Upload (Mbps)',
                            data: validData.map(d => d.upload),
                            borderColor: '#4bc0c0',
                            backgroundColor: 'rgba(75, 192, 192, 0.1)',
                            fill: true,
                            tension: 0.3,
                            pointRadius: 2,
                            pointHoverRadius: 5
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: {
                        legend: { position: 'top' },
                        tooltip: {
                            callbacks: {
                                label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)} Mbps`
                            }
                        }
                    },
                    scales: {
                        x: { 
                            ticks: { maxTicksLimit: 15 },
                            title: { display: true, text: 'Horário' }
                        },
                        y: { 
                            beginAtZero: true,
                            title: { display: true, text: 'Mbps' }
                        }
                    }
                }
            });

            // 2. Gráfico de Linha: Ping
            new Chart(document.getElementById('pingChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Ping (ms)',
                        data: validData.map(d => d.ping),
                        borderColor: '#ffce56',
                        backgroundColor: 'rgba(255, 206, 86, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 2,
                        pointHoverRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: {
                        legend: { position: 'top' }
                    },
                    scales: {
                        x: { 
                            ticks: { maxTicksLimit: 15 },
                            title: { display: true, text: 'Horário' }
                        },
                        y: { 
                            beginAtZero: true,
                            title: { display: true, text: 'ms' }
                        }
                    }
                }
            });

            // 3. Gráfico de Dispersão (Scatter)
            new Chart(document.getElementById('scatterChart'), {
                type: 'scatter',
                data: {
                    datasets: [{
                        label: 'Download vs Upload',
                        data: validData.map(d => ({ x: d.download, y: d.upload })),
                        backgroundColor: 'rgba(153, 102, 255, 0.6)',
                        borderColor: '#9966ff',
                        pointRadius: 5,
                        pointHoverRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top' },
                        tooltip: {
                            callbacks: {
                                label: ctx => `Download: ${ctx.parsed.x} Mbps | Upload: ${ctx.parsed.y} Mbps`
                            }
                        }
                    },
                    scales: {
                        x: { 
                            beginAtZero: true,
                            title: { display: true, text: 'Download (Mbps)' }
                        },
                        y: { 
                            beginAtZero: true,
                            title: { display: true, text: 'Upload (Mbps)' }
                        }
                    }
                }
            });

        } catch (error) {
            console.error(error);
            document.getElementById('dashboard-subtitle').innerHTML = `<span class="error-message">Erro ao processar os dados: ${error.message}</span>`;
        }
    }

    // Executa a função ao carregar a página
    window.onload = initDashboard;
    </script>
</body>
</html>
